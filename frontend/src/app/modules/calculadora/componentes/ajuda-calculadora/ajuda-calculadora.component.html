<button
  type="button"
  class="ajuda-limpar"
  [class.ajuda-limpar--confirmando]="confirmandoLimpeza()"
  [attr.aria-label]="
    confirmandoLimpeza()
      ? 'Confirmar: voltar esta aba ao estado padrão'
      : 'Limpar: voltar esta aba ao estado padrão'
  "
  (click)="aoClicarLimpar()"
>
  <span class="ajuda-limpar__marca" aria-hidden="true">{{ confirmandoLimpeza() ? '!' : '↺' }}</span>
  <span>{{ confirmandoLimpeza() ? 'Tem certeza?' : 'Limpar' }}</span>
</button>

<button
  type="button"
  class="ajuda-gatilho"
  [attr.aria-label]="'Ajuda: como usar ' + conteudo().titulo"
  (click)="abrir()"
>
  <span class="ajuda-gatilho__marca" aria-hidden="true">?</span>
  <span>Ajuda</span>
</button>

@if (aberto()) {
  <div class="ajuda-modal-fundo">
    <div class="ajuda-modal" role="dialog" aria-modal="true" [attr.aria-label]="conteudo().titulo">
      <header class="ajuda-modal__cabecalho">
        <h3 class="ajuda-modal__titulo">{{ conteudo().titulo }}</h3>
        <button
          type="button"
          class="ajuda-modal__fechar"
          aria-label="Fechar ajuda"
          (click)="fechar()"
        >
          ×
        </button>
      </header>

      <p class="ajuda-modal__resumo">{{ conteudo().resumo }}</p>

      <ul class="ajuda-modal__lista">
        @for (passo of conteudo().passos; track $index) {
          <li class="ajuda-modal__item">{{ passo }}</li>
        }
      </ul>

      @if (conteudo().nota; as nota) {
        <p class="ajuda-modal__nota">{{ nota }}</p>
      }

      <div class="ajuda-modal__acoes">
        <button type="button" class="ajuda-btn" (click)="fechar()">Fechar</button>
      </div>
    </div>
  </div>
}
