<section class="campanha-formulario">
  <article class="card">
    <header class="card__cabecalho">
      <span class="card__indice">//</span>
      <h1 class="card__titulo">Nova campanha</h1>
      <span class="card__regua"></span>
    </header>

    <form class="campanha-formulario__corpo" [formGroup]="formulario" (ngSubmit)="enviar()">
      <label class="campanha-formulario__campo">
        <span class="campanha-formulario__rotulo">Nome</span>
        <input class="campanha-formulario__entrada" type="text" formControlName="nome" />
      </label>

      <label class="campanha-formulario__campo">
        <span class="campanha-formulario__rotulo">Descrição (opcional)</span>
        <textarea
          class="campanha-formulario__entrada campanha-formulario__entrada--area"
          formControlName="descricao"
          rows="3"
        ></textarea>
      </label>

      <button
        class="botao botao--primario campanha-formulario__enviar"
        type="submit"
        [disabled]="enviando()"
      >
        {{ enviando() ? 'Criando…' : 'Criar campanha' }}
      </button>
    </form>

    <p class="campanha-formulario__alternativa">
      <a class="campanha-formulario__link" routerLink="/painel">Voltar às campanhas</a>
    </p>
  </article>
</section>
