<section class="autenticacao">
  <div class="autenticacao__moldura">
    <div class="autenticacao__marca">
      <app-marca class="autenticacao__marca-agua" />
      <span class="autenticacao__canto autenticacao__canto--esquerda" aria-hidden="true"></span>
      <span class="autenticacao__canto autenticacao__canto--direita" aria-hidden="true"></span>

      <div class="autenticacao__marca-linha">
        <app-marca class="autenticacao__logo" />
        <span class="autenticacao__marca-texto">CONTRATADOS<span class="autenticacao__marca-sufixo">RPG</span></span>
      </div>
      <span class="autenticacao__eyebrow">Solicitação de credencial</span>
      <h2 class="autenticacao__slogan">Registre-se como agente.</h2>
      <p class="autenticacao__descricao">
        Uma conta serve para todas as suas campanhas — como jogador ou como mestre.
      </p>

      <div class="autenticacao__nota">
        <app-icone nome="protecoes" />
        <span>Seus dados de identificação ficam restritos aos membros da sua campanha.</span>
      </div>
    </div>

    <div class="autenticacao__painel">
      <span class="autenticacao__eyebrow">Novo registro</span>
      <h1 class="autenticacao__titulo">Criar conta</h1>
      <p class="autenticacao__descricao">Leva menos de um minuto.</p>

      <form class="autenticacao__formulario" [formGroup]="formulario" (ngSubmit)="enviar()">
        <label class="autenticacao__campo">
          <span class="autenticacao__rotulo">Nome</span>
          <input
            class="autenticacao__entrada"
            type="text"
            formControlName="nome"
            autocomplete="name"
          />
        </label>

        <label class="autenticacao__campo">
          <span class="autenticacao__rotulo">Login</span>
          <input
            class="autenticacao__entrada"
            type="text"
            formControlName="login"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
          />
        </label>

        <label class="autenticacao__campo">
          <span class="autenticacao__rotulo">Senha</span>
          <div class="autenticacao__campo-senha">
            <input
              class="autenticacao__entrada autenticacao__entrada--senha"
              [type]="senhaVisivel() ? 'text' : 'password'"
              formControlName="senha"
              autocomplete="new-password"
            />
            <button
              class="autenticacao__olho"
              type="button"
              [attr.aria-label]="senhaVisivel() ? 'Ocultar senha' : 'Mostrar senha'"
              [attr.aria-pressed]="senhaVisivel()"
              (click)="alternarSenha()"
            >
              <app-icone [nome]="senhaVisivel() ? 'olho-fechado' : 'olho'" />
            </button>
          </div>
          @if (formulario.controls.senha.touched && formulario.controls.senha.hasError('minlength')) {
            <span class="autenticacao__erro">Mínimo de 6 caracteres.</span>
          }
        </label>

        <label class="autenticacao__campo">
          <span class="autenticacao__rotulo">Confirmar senha</span>
          <div class="autenticacao__campo-senha">
            <input
              class="autenticacao__entrada autenticacao__entrada--senha"
              [type]="confirmacaoVisivel() ? 'text' : 'password'"
              formControlName="confirmacaoSenha"
              autocomplete="new-password"
            />
            <button
              class="autenticacao__olho"
              type="button"
              [attr.aria-label]="confirmacaoVisivel() ? 'Ocultar senha' : 'Mostrar senha'"
              [attr.aria-pressed]="confirmacaoVisivel()"
              (click)="alternarConfirmacao()"
            >
              <app-icone [nome]="confirmacaoVisivel() ? 'olho-fechado' : 'olho'" />
            </button>
          </div>
          @if (formulario.controls.confirmacaoSenha.touched && formulario.hasError('senhasDivergentes')) {
            <span class="autenticacao__erro">As senhas não coincidem.</span>
          }
        </label>

        <button
          class="botao botao--primario autenticacao__enviar"
          type="submit"
          [disabled]="enviando()"
        >
          <app-icone nome="mais" />
          {{ enviando() ? 'Registrando…' : 'Registrar' }}
        </button>
      </form>

      <p class="autenticacao__alternativa">
        Já tem credenciais?
        <a class="autenticacao__link" routerLink="/login">Entrar</a>
      </p>
    </div>
  </div>
</section>
