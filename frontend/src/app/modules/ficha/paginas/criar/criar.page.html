<section class="ficha-pagina">
  <header class="ficha-pagina__topo">
    <a class="ficha-pagina__voltar" [routerLink]="['/painel', campanhaId]">
      <app-icone nome="voltar" />
      <span>Voltar à campanha</span>
    </a>
    <h1 class="ficha-pagina__titulo">Nova Ficha de Jogador</h1>
    <p class="ficha-pagina__legenda">
      Monte o agente — classe, atributos e estado. Os status são calculados ao vivo.
    </p>
  </header>

  <app-ficha-formulario rotuloAcao="Criar ficha" [salvando]="salvando()" (salvar)="criar($event)" />
</section>
