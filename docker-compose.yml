# PostgreSQL 16 local para desenvolvimento.
# As variáveis são interpoladas a partir do arquivo `.env` na raiz do repositório
# (Docker Compose carrega `.env` automaticamente). Ver `.env.example` e SYSTEM.SPEC §10.6.
services:
  postgres:
    image: postgres:16
    container_name: contratados-rpg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USUARIO}
      POSTGRES_PASSWORD: ${DB_SENHA}
      POSTGRES_DB: ${DB_NOME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USUARIO} -d ${DB_NOME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
